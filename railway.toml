# Railway deployment config — https://docs.railway.com/reference/config-as-code
# Deploys the component SHOWCASE (static SPA). The library itself is published
# to GitHub Packages, not run as a service.
[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
healthcheckPath = "/"
healthcheckTimeout = 30
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 5
